---
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "waiting"
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      dev-dependencies:
        patterns:
          - "*"
        update-types:
          - "major"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "waiting"
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      all-actions:
        patterns:
          - "*"
